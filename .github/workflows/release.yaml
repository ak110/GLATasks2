name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: バージョン番号の更新タイプ
        required: true
        type: choice
        options:
          - バグフィックス
          - マイナーバージョンアップ
          - メジャーバージョンアップ
        default: バグフィックス

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          commit_sha="$(git rev-parse HEAD)"
          echo "Checking CI for commit: ${commit_sha}"

          for i in $(seq 1 60); do
            conclusion="$(gh run list --workflow=ci.yaml --branch=master --commit="${commit_sha}" -L1 --json conclusion --jq '.[0].conclusion')"
            echo "Attempt ${i}: conclusion=${conclusion}"
            if [ "${conclusion}" = "success" ]; then
              echo "CI passed"
              exit 0
            elif [ "${conclusion}" = "failure" ] || [ "${conclusion}" = "cancelled" ]; then
              echo "Error: CI が成功していません (conclusion: ${conclusion})"
              exit 1
            fi
            sleep 30
          done

          echo "Error: CI の完了待ちがタイムアウトしました"
          exit 1

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get latest tag
        id: current
        run: |
          git fetch --tags
          latest=$(git tag --sort=version:refname | tail -n1)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next
        run: |
          v=${{ steps.current.outputs.latest }}
          IFS='.' read -r major minor patch <<< "${v#v}"
          case '${{ github.event.inputs.bump }}' in
            'バグフィックス') ((++patch));;
            'マイナーバージョンアップ') ((++minor)); patch=0;;
            'メジャーバージョンアップ') ((++major)); minor=0; patch=0;;
            *) echo "Unknown bump: '${{ github.event.inputs.bump }}'" >&2; exit 1;;
          esac
          echo "next=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.next.outputs.next }}" --target=master --generate-notes

      - name: Run deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yaml --ref=master
